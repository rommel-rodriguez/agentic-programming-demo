# version: "3"

services:
  lg-app:
    profiles: ["dev"]
    build:
      context: ./langgraph-demo
      args:
        APP_ENV: "test"
        USER_UID: ${LOCAL_UID:-1000}  # Local dev needs to match its user's uid and gid
        USER_GID: ${LOCAL_GID:-1000}  # in order to be able to write to app's folder
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./langgraph-demo:/app
      - /etc/localtime:/etc/localtime:ro 
    command: >
      sh -c "uvicorn --reload --host 0.0.0.0 --app-dir src/ app.entrypoints.webapp.asgi:app"
    env_file:
      - ./langgraph-demo/.env
    environment:
      DB_HOST: psdb
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@psdb:5432/${POSTGRES_DB}
      DB_URL_SQLALCHEMY: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@psdb:5432/${POSTGRES_DB}

    depends_on:
      psdb:
        condition: service_healthy

  psdb:
    image: postgres:18.1-bookworm
    ports:
      - "5432:5432"
    volumes:
      - psdb_data:/var/lib/postgresql
    env_file:
      - ./langgraph-demo/.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      # PGDATA: ${PGDATA}
      # POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
      # POSTGRES_INITDB_WALDIR: ${POSTGRES_INITDB_WALDIR}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate-dev:
    profiles: ["dev","tools"]
    build:
      context: ./langgraph-demo
      args:
        APP_ENV: dev
        USER_UID: ${LOCAL_UID:-1000}
        USER_GID: ${LOCAL_GID:-1000}
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    env_file: [ ./langgraph-demo/.env ]
    environment:
      DB_URL_SQLALCHEMY: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@psdb:5432/${POSTGRES_DB}
    volumes:
      - ./langgraph-demo:/app
    entrypoint: ["sh", "-c"]
    command: "alembic upgrade head"
    depends_on:
      psdb:
        condition: service_healthy

